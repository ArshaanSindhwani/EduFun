<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Welcome to the EduFun Home Page!</title>
    <meta name="description" content="Home Page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="">
    <link rel="icon" type="image/png" href="/frontend/Assets/Favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body background="/frontend/Assets/Background (1).jpg" style="font-family: 'Kdam Thmor Pro', sans-serif">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Kdam+Thmor+Pro&family=VT323&display=swap');
    body {
        font-family: 'Kdam Thmor Pro', sans-serif;
    }
  </style>
    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">

            <!-- Left Sidebar-->
            <div class="col-2 bg-primary d-flex flex-column align-items-center p-3" id="navbar">
                <div class="bg-primary-subtle rounded-1 p-1 mb-4 w-100 text-center">
                    <img src="/frontend/Assets/Logo.png" class="img-fluid">
                </div>
                <button type="button" class="btn btn-info rounded-pill h-80 w-100 mb-3" id="user-nav">Profile</button>
                <button type="button" class="btn btn-info rounded-pill h-80 w-100 mb-3" id="classes-nav">My Classes</button>
                <button type="button" class="btn btn-info rounded-pill h-80 w-100 mb-3" id="scores-nav">My Scores</button>
            </div>

            <!-- Home Page Content-->
            <div class="col-10">

                <!-- Top Logo Banner and Back Button -->
                <div class="d-flex justify-content-between align-items-center p-3" style="min-height:120px">
                    <div><!-- Add logo --></div>
                    <button type="button" class="btn btn-light rounded-pill px-4" id="logout-nav">Logout</button>
                </div>

                <!-- Welcome User Content -->
                <div class="container text-center p-4">

                    <!-- Welcome User Message -->
                    <div class="mb-5">
                        <h1 class="mb-3 bg-primary-subtle rounded-4 p-2 mb-2">Welcome</h1>
                            <!-- , <span id="user-name">'name'</span></h1> -->
                    </div>

                    <!-- My Games -->
                    <div class="mb-4">
                        <div class="bg-primary-subtle rounded-4 p-2 mb-2">
                            <h4 class="mb-0">My Games!</h4>
                        </div>
                        <div class="bg-secondary-subtle rounded-4 p-4">
 
                            <!-- Game row 1 - links to GamePage -->
                            <div class="bg-white rounded-pill p-3 mb-3 row mx-0" id="game-1" style="cursor:pointer">
                                <div class="col text-center border-end fw-semibold">WW2</div>
                                <div class="col text-center border-end">History</div>
                                <div class="col text-center border-end">Mr Snape</div>
                            </div>
 
                            <!-- Game row 2 -->
                            <div class="bg-white rounded-pill p-3 mb-3 row mx-0" id="game-2" style="cursor:pointer">
                                <div class="col text-center border-end fw-semibold">Romans</div>
                                <div class="col text-center border-end">History</div>
                                <div class="col text-center border-end">Mr Snape</div>
                            </div>
 
                            <!-- Game row 3 -->
                            <div class="bg-white rounded-pill p-3 mb-3 row mx-0" id="game-3" style="cursor:pointer">
                                <div class="col text-center border-end fw-semibold">Shakespeare</div>
                                <div class="col text-center border-end">English</div>
                                <div class="col text-center border-end">Miss McGonagall</div>
                            </div>
 
                            <!-- Game row 4 -->
                            <div class="bg-white rounded-pill p-3 mb-3 row mx-0" id="game-4" style="cursor:pointer">
                                <div class="col text-center border-end fw-semibold">Geo Quiz</div>
                                <div class="col text-center border-end">Geography</div>
                                <div class="col text-center border-end">Mr Lupin</div>
                            </div>
 
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="Home.js"></script>

</body>
</html>
