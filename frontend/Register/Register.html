!<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Register with EduFun!</title>
        <meta name="description" content="Login and launch page">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <link rel="icon" type="image/png" href="/frontend/Assets/Favicon.png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body background="/frontend/Assets/Background (1).jpg" style="font-family: 'Kdam Thmor Pro', sans-serif">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Kdam+Thmor+Pro&family=VT323&display=swap');
            body {
                font-family: 'Kdam Thmor Pro', sans-serif;
            }
        </style>
        <div class="container text-center p-5" style="font-family: 'Kdam Thmor Pro', sans-serif">
            <div class="row">
                <div class="col">

                </div>
                <div class="col-7 bg-primary-subtle rounded-5" >
                    <div>
                        <img src="/frontend/Assets/Logo.png" class="img-fluid">
                    </div>
                    <div>
                        <h4>Register here</h4>
                        <form id="register-form">
                            <fieldset class="mb-3 mx-auto" style="width:300px">
                                <label for="name" class="form-label">name</label>
                                <input type="name" class="form-control" id="name" name="name" placeholder="name">
                            </fieldset>
                            <fieldset class="mb-3 mx-auto" style="width:300px">
                                <label for="form" class="form-label">form</label>
                                <input type="form" class="form-control" id="form" name="form" placeholder="form">
                            </fieldset>
                            <fieldset class="mb-3 mx-auto" style="width:300px">
                                <label for="username" class="form-label">Username</label>
                                <input type="username" class="form-control" id="username" name="username" placeholder="Username">
                            </fieldset>
                            <fieldset class="mb-3 mx-auto" style="width:300px">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Password">
                            </fieldset>
                            <input type="submit" class="btn btn-primary"></button>
                        </form>
                        <button type="button" class="btn btn-primary" id="login-nav">Login Here</button>
                        <p></p>
                    </div>
                </div>
                    <div class="col">    
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="./Register.js" async defer></script>
    </body>
</html>
