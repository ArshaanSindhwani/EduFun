<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Your Progress on EduFun!</title>
    <meta name="description" content="Progress Page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="">
    <link rel="icon" type="image/png" href="/frontend/Assets/Favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body background="/frontend/Assets/Background (1).jpg" style="font-family: Montserrat, sans-serif">
    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">

            <!-- Left Sidebar-->
            <div class="col-2 bg-primary d-flex flex-column align-items-center p-3">
                <div class="bg-primary-subtle rounded-1 p-1 mb-4 w-100 text-center">
                    <img src="/frontend/Assets/Logo.png" class="img-fluid">
                </div>
                <button type="button" class="btn btn-info rounded-pill h-80 w-100 mb-3" id="user-nav">User info /Profile</button>
                <button type="button" class="btn btn-info rounded-pill h-80 w-100 mb-3" id="classes-nav">My Classes</button>
                <button type="button" class="btn btn-light rounded-pill h-80 w-100 mb-3" id="scores-nav">My Scores</button>
            </div>

            <!-- Results Page Content-->
            <div class="col-10">

                <!-- Top Logo banner and back button-->
                <div class="d-flex justify-content-between align-items-center p-3" style="min-height:120px">
                    <div><!-- Add logo --></div>
                    <button type="button" class="btn btn-light rounded-pill px-4" id="back-nav">Back</button>
                </div>

                <!-- Progress Section Content -->
                <div class="container text-center p-4">

                    <!-- Top Progress Content-->
                    <div class="mb-5 d-inline-block">
                        <h1 class="mb-3">Your Progress</h1>
                        <div class="progress" id="your-progress">
                            <div class="progress-bar" role="progressbar" style="width: 45%;" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100">45%</div>
                        </div>
                    </div>

                    <!-- Subject and Game Progress -->
                     <div class="row mt-5">

                        <!-- Game Progress -->
                         <div class="col-6 mb-4">
                            <div class="bg-primary-subtle rounded-4 p-2 mb-2">
                                <h4 class="mb-0">My Game Score</h4>
                            </div>
                            <div class="bg-secondary-subtle rounded-4 p-4">

                                <div class="mb-4">
                                    <h5 class="text-primary text-start mb-2">1066</h5>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar" style="width: 50%;" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">50%</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <h5 class="text-primary text-start mb-2">WW2</h5>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar" style="width: 25%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">25%</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <h5 class="text-primary text-start mb-2">Romans</h5>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar" style="width: 50%;" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">50%</div>
                                    </div>
                                </div>

                            </div>
                         </div>

                        <!-- Game scores -->
                        <div class="col-6 mb-4">
                            <div class="bg-primary-subtle rounded-4 p-2 mb-2">
                                <h4 class="mb-0">My Subject Scores</h4>
                            </div>
                            <div class="bg-secondary-subtle rounded-4 p-4">

                                <div class="mb-4">
                                    <h5 class="text-primary text-start mb-2">History</h5>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar" style="width: 50%;" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">50%</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <h5 class="text-primary text-start mb-2">Geography</h5>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar" style="width: 85%;" aria-valuenow="85" aria-valuemin="0" aria-valuemax="100">85%</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <h5 class="text-primary text-start mb-2">English</h5>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar" style="width: 20%;" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100">20%</div>
                                    </div>
                                </div>

                            </div>
                        </div>
                     </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
